name: Release

# Build Touchy.app and attach it to a GitHub Release.
# Trigger by pushing a version tag, e.g.:  git tag v1.0.0 && git push origin v1.0.0
# Or run manually from the Actions tab, supplying a tag.
on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:
    inputs:
      tag:
        description: 'Release tag to create (e.g. v1.0.0)'
        required: true

permissions:
  contents: write

jobs:
  build-release:
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4

      - name: Select latest stable Xcode
        uses: maxim-lobanov/setup-xcode@v1
        with:
          xcode-version: latest-stable

      - name: Show toolchain
        run: swift --version && xcodebuild -version

      - name: Build & assemble app
        # No Apple/self-signed identity on CI, so make-app.sh ad-hoc signs.
        run: ./scripts/make-app.sh release

      - name: Resolve version & package
        id: pkg
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            VERSION="${{ github.event.inputs.tag }}"
          else
            VERSION="${GITHUB_REF_NAME}"
          fi
          ZIP="Touchy-${VERSION}.zip"
          # ditto preserves the .app bundle structure (symlinks, metadata, signature).
          ditto -c -k --keepParent "Touchy.app" "$ZIP"
          shasum -a 256 "$ZIP" > "${ZIP}.sha256"
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"
          echo "zip=$ZIP" >> "$GITHUB_OUTPUT"

      - name: Create release and upload binary
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.pkg.outputs.version }}
          name: Touchy ${{ steps.pkg.outputs.version }}
          generate_release_notes: true
          files: |
            ${{ steps.pkg.outputs.zip }}
            ${{ steps.pkg.outputs.zip }}.sha256
          body: |
            ## Touchy ${{ steps.pkg.outputs.version }}

            Trackpad multitouch-gesture remapper (menu-bar app).

            **Install**
            1. Download and unzip `Touchy-${{ steps.pkg.outputs.version }}.zip`.
            2. This build is **ad-hoc signed (not notarized)** — the first launch,
               right-click `Touchy.app` ▸ **Open**, then confirm.
            3. Grant **Accessibility** when prompted (needed to send keystrokes).
