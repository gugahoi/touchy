name: Release

# Build Touchy.app, attach it to a GitHub Release, and update the Homebrew cask.
# Trigger by pushing a version tag, e.g.:  git tag v1.0.0 && git push origin v1.0.0
# Or run manually from the Actions tab, supplying a tag.
on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:
    inputs:
      tag:
        description: 'Release tag to create (e.g. v1.0.0)'
        required: true

permissions:
  contents: write

jobs:
  release:
    runs-on: macos-latest
    steps:
      - name: Check out release tag
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Select latest stable Xcode
        uses: maxim-lobanov/setup-xcode@v1
        with:
          xcode-version: latest-stable

      - name: Resolve release metadata
        id: release
        run: |
          set -euo pipefail
          if [[ "${GITHUB_EVENT_NAME}" == "workflow_dispatch" ]]; then
            TAG="${{ inputs.tag }}"
          else
            TAG="${GITHUB_REF_NAME}"
          fi
          if [[ ! "${TAG}" =~ ^v[0-9] ]]; then
            echo "Release tag must start with v, for example v1.0.0." >&2
            exit 1
          fi
          VERSION="${TAG#v}"
          ASSET_NAME="Touchy-${TAG}-macOS.zip"
          echo "tag=${TAG}" >>"${GITHUB_OUTPUT}"
          echo "version=${VERSION}" >>"${GITHUB_OUTPUT}"
          echo "asset_name=${ASSET_NAME}" >>"${GITHUB_OUTPUT}"

      - name: Check out manual tag if it exists
        if: github.event_name == 'workflow_dispatch'
        env:
          TAG: ${{ steps.release.outputs.tag }}
        run: |
          set -euo pipefail
          if git rev-parse -q --verify "refs/tags/${TAG}" >/dev/null; then
            git checkout "${TAG}"
          else
            echo "Tag ${TAG} does not exist yet; the release will create it from this commit."
          fi

      - name: Build app bundle
        run: ./scripts/make-app.sh release

      - name: Package release asset
        id: package
        run: |
          set -euo pipefail
          mkdir -p dist
          ditto -c -k --keepParent Touchy.app "dist/${{ steps.release.outputs.asset_name }}"
          SHA256="$(shasum -a 256 "dist/${{ steps.release.outputs.asset_name }}" | cut -d ' ' -f 1)"
          echo "sha256=${SHA256}" >>"${GITHUB_OUTPUT}"

      - name: Publish GitHub Release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TAG: ${{ steps.release.outputs.tag }}
          ASSET: dist/${{ steps.release.outputs.asset_name }}
        run: |
          set -euo pipefail
          if gh release view "${TAG}" >/dev/null 2>&1; then
            gh release upload "${TAG}" "${ASSET}" --clobber
          elif git rev-parse -q --verify "refs/tags/${TAG}" >/dev/null; then
            gh release create "${TAG}" "${ASSET}" --title "${TAG}" --generate-notes
          else
            gh release create "${TAG}" "${ASSET}" --title "${TAG}" --generate-notes --target "${GITHUB_SHA}"
          fi

      - name: Generate Homebrew tap token
        id: tap-token
        uses: actions/create-github-app-token@v3
        with:
          client-id: ${{ vars.HOMEBREW_TAP_CLIENT_ID }}
          private-key: ${{ secrets.HOMEBREW_TAP_APP_PRIVATE_KEY }}
          owner: gugahoi
          repositories: homebrew-tap

      - name: Update Homebrew cask
        env:
          TAP_TOKEN: ${{ steps.tap-token.outputs.token }}
          TAG: ${{ steps.release.outputs.tag }}
          ASSET_NAME: ${{ steps.release.outputs.asset_name }}
          SHA256: ${{ steps.package.outputs.sha256 }}
        run: |
          set -euo pipefail
          git clone "https://x-access-token:${TAP_TOKEN}@github.com/gugahoi/homebrew-tap.git" homebrew-tap
          ./scripts/write-cask.sh "${TAG}" "${ASSET_NAME}" "${SHA256}" homebrew-tap/Casks/touchy.rb
          git -C homebrew-tap config user.name "github-actions[bot]"
          git -C homebrew-tap config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git -C homebrew-tap add Casks/touchy.rb
          if git -C homebrew-tap diff --cached --quiet; then
            echo "Homebrew cask is already up to date."
          else
            git -C homebrew-tap commit -m "Update Touchy cask to ${TAG}"
            git -C homebrew-tap push
          fi
