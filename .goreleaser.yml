version: 2

before:
  hooks:
    - ./scripts/make-app.sh release

builds: []

archives:
  - id: touchy-app
    name_template: '{{ .ProjectName }}-{{ .Version }}-{{ .Os }}-{{ .Arch }}'
    formats: ['zip']
    files:
      - Touchy.app/**
      - LICENSE*
      - README*
    wrap_in_directory: true

release:
  github:
    owner: gugahoi
    name: touchy
  draft: false
  prerelease: auto
  mode: replace

homebrew_casks:
  - repository:
      owner: gugahoi
      name: homebrew-tap
      token: "{{ .Env.HOMEBREW_TAP_GITHUB_TOKEN }}"
    directory: Casks

checksum:
  name_template: 'checksums.txt'

snapshot:
  version_template: "{{ incpatch .Version }}-next"

changelog:
  sort: asc
  filters:
    exclude:
      - '^docs:'
      - '^test:'
      - '^chore:'
      - Merge pull request
      - Merge branch
